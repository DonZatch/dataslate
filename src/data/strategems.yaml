# General-use Strategems
- # Command Re-roll
  name: Command Re-roll
  cost: 1
  turn: either
  when: "Any phase, just after you make one of the following rolls for a friendly unit or model:
    <ul>
      <li><strong>Advance Roll</strong></li>
      <li><strong>Charge Roll</strong></li>
      <li><strong>Damage Roll</strong></li>
      <li><strong>Hazard Roll</strong></li>
      <li><strong>Hit Roll</strong></li>
      <li><strong>Save Roll</strong></li>
      <li><strong>Wound Roll</strong></li>
      <li>A roll to determine the number of attacks generated with a weapon.</li>
    </ul>
    "
  target: "That unit or model."
  effect: "You re-roll that roll. If you are rolling more than one dice together, select one of those dice to re-roll (excluding <strong>charge rolls</strong>, which you must re-roll in full)."
- # Epic Challenge
  name: Epic Challenge
  cost: 1
  turn: either
  when: "Fight phase, just after a friendly <strong>CHARACTER</strong> unit is <strong>selected to fight</strong>."
  target: "One <strong>CHARACTER</strong> unit."
  effect: "Select one <strong>CHARACTER</strong> model in your unit. Until the end of the phase, that model's melee weapons have the <strong>[PRECISION]</strong> ability."
- # Insane Bravery
  name: Insane Bravery
  cost: 1
  turn: your
  when: "Battle-shock step of your Command phase, just before you make a <strong>battle-shock roll</strong> for a friendly unit."
  target: "That unit."
  effect: "That <strong>battle-shock roll</strong> is automatically successful."
  restrictions: "You cannot use this <strong>stratagem</strong> more than once per battle."
- # Explosives
  name: Explosives
  cost: 1
  turn: your
  when: "Your Shooting phase."
  target: "One friendly <strong>unengaged</strong> <strong>EXPLOSIVES/GRENADES</strong> unit that is <strong>eligible to shoot</strong> and did not make an <strong>advance move</strong> this turn."
  effect: "Resolve the following sequence:
    <ol>
      <li>Select one <strong>EXPLOSIVES/GRENADES</strong> model in your unit.</li>
      <li>Select one <strong>unengaged</strong> enemy unit within 8\" of and <strong>visible</strong> to that model.</li>
      <li>Roll six D6: for each 4+, that enemy unit suffers 1 <strong>mortal wound</strong> (06.02).</li>
    <ol>"
- # Crushing Impact
  name: Crushing Impact
  cost: 1
  turn: your
  when: "Your Charge phase, just after a friendly <strong>MONSTER/VEHICLE</strong> unit ends a <strong>charge move</strong>."
  target: "That <strong>MONSTER/VEHICLE</strong> unit."
  effect: "Resolve the following sequence:
    <ol>
      <li>Select one enemy unit <strong>engaged</strong> with your unit.</li>
      <li>Select one model in your unit <strong>engaged</strong> with that enemy unit.</li>
      <li>Roll a number of D6 equal to the <strong>T</strong> characteristic of that model: for each 1, your unit suffers 1 <strong>mortal wound</strong>; for each 5+, that enemy unit suffers 1 <strong>mortal wound</strong> (to a maximum of 6 <strong>mortal wounds</strong> per unit).</li>
    </ol>"
- # Rapid Ingress
  name: Rapid Ingress
  cost: 1
  turn: opponent
  when: "End of your opponent's Movement phase."
  target: "One friendly unit that is in <strong>strategic reserves</strong> (excluding <strong>AIRCRAFT</strong>)."
  effect: "Your unit makes an <strong>ingress move</strong> (20.04)."
  restrictions: "You cannot use this <strong>stratagem</strong> during the first battle round."
- # Fire Overwatch
  name: Fire Overwatch
  cost: 1
  turn: opponent
  when: "End of your opponent's Movement phase."
  target: "One friendly <strong>unengaged</strong> unit (excluding <strong>TITANIC</strong> units)."
  effect: "<p>Your unit shoots using <strong>snap shooting</strong>:</p>
    <p>Your unit shoots as described in Making Attacks (04). While shooting:
      <ul>
        <li>You can only target <u>one</u> <strong>visible</strong> enemy unit within 24\" of your unit (and only if it is an eligible target).</li>
        <li>Each attack only hits on an unmodified <strong>hit roll</strong> of 6 (irrespective of the attacking weapon's <strong>BS</strong> characteristic or any modifiers).</li>
        <li>You cannot re-roll <strong>hit rolls</strong>.</li>
      </ul>
    </p>"
- # Smokescreen
  name: Smokescreen
  cost: 1
  turn: opponent
  when: "Start of your opponent's Shooting phase."
  target: "One friendly <strong>SMOKE unit.</strong>"
  effect: "Until the end of the phase, each time an attack targets either your <strong>SMOKE</strong> unit, or a unit that is not <strong>fully visible</strong> to the attacking model because of one or more models in your <strong>SMOKE</strong> unit, the target has the <strong>benefit of cover</strong> against that attack (13.08)."
- # Heroic Intervention
  name: Heroic Intervention
  cost: 1+
  turn: opponent
  when: "End of your opponent's Charge phase."
  target: "One friendly <strong>unengaged</strong> unit within 12\" of one or more enemy units. You can only select a <strong>VEHICLE</strong> unit if it is a <strong>CHARACTER/WALKER</strong> unit."
  effect: "<strong>Resolve a charge</strong> with your unit. While doing so, before making the <strong>charge roll</strong>, you must select <u>one</u> of the following modes:
    <ul>
      <li><strong>(1 CP) Leap to Defend:</strong> When selecting <strong>charge targets</strong>, you can only select enemy units that made a <strong>charge move</strong> this phase and are within the <strong>maximum distance</strong>.</li>
      <li><strong>(2 CP) Into the Fray:</strong>
        <ul>
          <li>When making the <strong>charge roll</strong>, if the result is greater than 6 (after modifiers), change it to 6.</li>
          <li>When selecting <strong>charge targets</strong>, you can select <u>any</u> enemy units that are within 6\" of your unit and within the <strong>maximum distance</strong>.</li>
        </ul>
    </ul>"
- # Counteroffensive
  name: Counteroffensive
  cost: 2
  turn: opponent
  when: "Fight step of your opponent's Fight phase, just after an enemy unit has resolved its attacks."
  target: "One friendly unit that is <strong>eligible to fight</strong>."
  effect: "Until the end of the phase, your unit has the <strong>Fights First</strong> ability and it must be the next unit you <strong>select to fight</strong> (12.04)."