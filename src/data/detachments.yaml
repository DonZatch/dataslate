  -
    name: "Bag The Big 'Un"
    text: "At the start of the first battle round, select one enemy MONSTER or VEHICLE model. If there are no such enemy models, select the enemy WARLORD model instead.
    
      At the end of the battle, you score 8VP if that enemy model is destroyed. If that enemy model was destroyed by your BEASTBOSS model, you score 12VP instead."
  -
    name: "Krumpin' Spree"
    text: "At the end of your turn, you score 3VP if you control the objective marker closest to your opponent's battlefield edge and you score 1VP for each other objective you control that is not within your deployment zone."
