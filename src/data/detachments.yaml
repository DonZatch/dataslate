# Combat Patrols
- # Strike Force Octavius
  name: Strike Force Octavius
  strategems:
  -
    name: Gene-wrought Resilience
    cost: 1
    turn: either
    when: "Your opponent's Shooting phase or the Fight phase, just after an enemy unit has selected its targets."
    target: "One ADEPTUS ASTARTES unit from your army that was selected as the target of one or more of the attacking unit's attacks."
    effect: "Until the end of the phase, each time an attack targets your unit, if the Strength characteristic of that attack is greater than your unit's Toughness characteristic, subtract 1 from the Wound roll."
  -
    name: Veteran Instincts
    cost: 1
    turn: either
    when: "Fight phase"
    target: "One TERMINATOR unit from your army that has not been selected to fight this phase."
    effect: "Until the end of the phase, each time a model in your unit makes an attack, re-roll a Wound roll of 1. If that attack targets a MONSTER or VEHICLE unit, you can re-roll the Wound roll instead."
  -
    name: Overwhelming Force
    cost: 1
    turn: your
    when: "End of your Command phase"
    target: "One ADEPTUS ASTARTES unit from your army that is within range of an objective marker you control."
    effect: "That objective marker is secured by you"
  enhancements:
  -
    name: "Champion Duellist"
    text: "The bearer's melee weapons have the [PRECISION] and [LETHAL HITS] abilities."
  -
    name: "Oathsworn Determination"
    text: "Improve the Objective Control characteristic of models in the bearer's unit by 1."
  secondaries:
  -
    name: Wrath Of The Emperor
    text: "At the end of each phase, you score 2VP if your CAPTAIN model destroyed one or more enemy models that phase."
  -
    name: Shock Tactics
    text: "At the end of each player's turn, you score 5VP if you control one or more objective markers that your opponent controlled at the start of that turn."
- # Assault Force
  name: Assault Force
  disposition: Take and Hold
  abilities:
  -
    name: Indomitable Resolve
    text: "Friendly <strong>ASSAULT FORCE</strong> units have +1 <strong>OC</strong>"
  strategems:
  -
    name: Relentless Aggression
    cost: 1
    turn: either
    when: "Fight phase, when a friendly <strong>ASSAULT FORCE</strong> unit is selected to make a <strong>consolidation move</strong>."
    target: "That <strong>ASSAULT FORCE</strong> unit."
    effect: "When making that <strong>consolidation move</strong>, your unit can move up to 6\""
  -
    name: Terrifying Charge
    cost: 1
    turn: your
    when: "Your Charge phase, when a friendly <strong>ASSAULT FORCE</strong> unit ends a <strong>charge move</strong>."
    target: "That <strong>ASSAULT FORCE</strong> unit."
    effect: "Select one enemy unit <strong>engaged</strong> with your unit. That enemy unit makes a <strong>battle-shock roll</strong>, with -1 to that <strong>battle-shock roll</strong>."
  -
    name: Decapitating Strike
    cost: 1
    turn: either
    when: "Fight phase, when a friendly <strong>ASSAULT FORCE</strong> unit is <strong>selected to fight</strong>"
    target: "That <strong>ASSAULT FORCE</strong> unit."
    effect: "Your unit's melee attacks have <strong>[PRECISION]</strong>"
  enhancements:
  -
    name: "Battle-line Veterans"
    target: Intercessor Squad (Assault Force)
    text: "Upgrade: <strong>ASSAULT FORCE INTERCESSOR SQUAD</strong> unit only. This unit's bolt rifle weapons have <strong>[RAPID FIRE 1]</strong>."
  -
    name: "Blade Masters"
    target: Vanguard Veteran Squad with Jump Packs (Assault Force)
    text: "Upgrade: <strong>ASSAULT FORCE VANGUARD VETERAN SQUAD WITH JUMP PACKS</strong> unit only. When an enemy unit ends a <strong>charge move</strong>, if that enemy unit is <strong>engaged</strong> with this unit, that unit's melee attacks have -1 to <strong>wound rolls</strong> until the end of that turn."
