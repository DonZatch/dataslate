- # Amonhotekh's Guard
  name: Amonhotekh's Guard
  disposition: Take and Hold
  abilities:
  -
    name: Territorial Imperatives
    text: "<ul>
      <li>At the end of your Command phase, you can select one friendly <strong>AMONHOTEKH'S GUARD</strong> unit. That unit has +1 <strong>OC</strong> until the start of your next Command phase.</li>
      <li>When playing a Combat Patrol battle, the following friendly units must start the battle in <strong>strategic reserves</strong> and cannot be set up on the battlefield before the battle round stated. When doing so, they must be set up wholly within your deployment zone.
        <ul>
          <li><strong>CANOPTEK DOOMSTALKER</strong>: Battle round 3.
        </ul>
        </li>
      </ul>"
  strategems:
  -
    name: "Gauss Storm"
    cost: 1
    turn: your
    when: "Your Shooting phase, when a friendly <strong>AMONHOTEKH'S GUARD NECRON WARRIORS</strong> unit is <strong>selected to shoot</strong>."
    target: "That <strong>AMONHOTEKH'S GUARD NECRON WARRIORS</strong> unit."
    effect: "Your unit's attacks have +1 to <strong>hit rolls</strong>"
  -
    name: "Aggression Protocols"
    cost: 1
    turn: your
    when: "Your Movement phase, when a friendly <strong>AMONHOTEKH'S GUARD</strong> unit (excluding <strong>MONSTER/VEHICLE</strong> units) is selected to make a <strong>fall-back move</strong>."
    target: "That <strong>AMONHOTEKH'S GUARD</strong> unit."
    effect: "That move does not prevent your unit from being <strong>eligible to shoot/declare a charge</strong>."
  -
    name: "Reinforced Resilience"
    cost: 1
    turn: opponent
    when: "Your opponent's Shooting phase, when an enemy unit targets a friendly <strong>AMONHOTEKH'S GUARD</strong> unit (excluding <strong>MONSTER/VEHICLE</strong> units) with every model within a <strong>terrain area</strong>."
    target: "That <strong>AMONHOTEKH'S GUARD</strong> unit."
    effect: "Your unit has +1 <strong>Sv</strong>."
  enhancements:
  -
    name: "Unblemished Legions"
    target: Necron Warriors (Amonhotekh's Guard)
    text: "Upgrade: <strong>AMONHOTEKH'S GUARD NECRON WARRIORS</strong> unit only.
      <ul>
        <li>This unit has +1 <strong>M</strong></li>
        <li>This unit's ranged attacks have <strong>[ASSAULT]</strong></li>
      </ul>"
  -
    name: "Metalline Might"
    target: Overlord Amonhotekh
    text: "<strong>AMONHOTEKH'S GUARD OVERLORD</strong> model only. This model's melee attacks have +2 <strong>S</strong>."
- # Morgim's Butchas
  name: Morgim's Butchas
  strategems:
