- # Canoptek Court
  name: Canoptek Court
  abilities:
  -
    name: Reanimation Protocols
    text: "<p>At the end of your Command phase, each unit from your army activates its Reanimation Protocols and reanimates D3 wounds. Each time such a unit reanimates a wound:</p>
      <ul>
        <li>If that unit contains one or more models with fewer than their starting number of wounds remaining, select one of those models; that model regains one lost wound.</li>
        <li>If all models in that unit have their starting number of wounds, but that unit is not at its Starting Strength, one destroyed model is returned to that unit with one wound remaining.</li>
      </ul>
      <p>Once such a unit is at its Starting Strength and all of its models have their starting number of wounds, nothing further happens.</p>"
  -
    name: Power Matrix
    text: "<p>Certain areas of the battlefield are considered to be within your army's Power Matrix, as follows:</p>
      <ul>
        <li>Your deployment zone is always within your army's Power Matrix.</li>
        <li>At the start of any phase, if you control at least half of the objective markers within No Man's Land, until the end of that phase, No Man's Land is within your army's Power Matrix.</li>
        <li>At the start of any phase, if you control at least half of the objective markers within your opponent's deployment zone, until the end of that phase, your opponent's deployment zone is within your army's Power Matrix</li>
      </ul>
      <p>Each time a model in a CRYPTEK or CANOPTEK unit from your army makes an attack, re-roll a Hit roll of 1. If such a unit is wholly within your army's Power Matrix, you can re-roll the Hit roll instead.</p>"
