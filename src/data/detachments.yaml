# Combat Patrols
- # Strike Force Octavius
  name: Strike Force Octavius
  abilities:
  -
    name: Oath of Moment
    text: " at the start of your Command phase, select one unit from your opponent's army. Until the start of your next Command phase, that enemy unit is your Oath of Moment target. Each time a model with this ability makes an attack that targets your Oath of Moment target, you can re-roll the Hit roll."
  strategems:
  -
    name: Gene-wrought Resilience
    cost: 1
    turn: either
    when: "Your opponent's Shooting phase or the Fight phase, just after an enemy unit has selected its targets."
    target: "One ADEPTUS ASTARTES unit from your army that was selected as the target of one or more of the attacking unit's attacks."
    effect: "Until the end of the phase, each time an attack targets your unit, if the Strength characteristic of that attack is greater than your unit's Toughness characteristic, subtract 1 from the Wound roll."
  -
    name: Veteran Instincts
    cost: 1
    turn: either
    when: "Fight phase"
    target: "One TERMINATOR unit from your army that has not been selected to fight this phase."
    effect: "Until the end of the phase, each time a model in your unit makes an attack, re-roll a Wound roll of 1. If that attack targets a MONSTER or VEHICLE unit, you can re-roll the Wound roll instead."
  -
    name: Overwhelming Force
    cost: 1
    turn: your
    when: "End of your Command phase"
    target: "One ADEPTUS ASTARTES unit from your army that is within range of an objective marker you control."
    effect: "That objective marker is secured by you"
  enhancements:
  -
    name: "Champion Duellist"
    text: "The bearer's melee weapons have the [PRECISION] and [LETHAL HITS] abilities."
  -
    name: "Oathsworn Determination"
    text: "Improve the Objective Control characteristic of models in the bearer's unit by 1."
  secondaries:
  -
    name: Wrath Of The Emperor
    text: "At the end of each phase, you score 2VP if your CAPTAIN model destroyed one or more enemy models that phase."
  -
    name: Shock Tactics
    text: "At the end of each player's turn, you score 5VP if you control one or more objective markers that your opponent controlled at the start of that turn."
- # The Vardenghast Swarm
  name: The Vardenghast Swarm
  disposition: Disruption
  abilities:
  -
    name: Synapse
    text: "While a TYRANIDS unit from your army is within 6\" of one or more friendly SYNAPSE models, that TYRANIDS unit is said to be within Synapse Range of those models and of your army. While a <strong>TYRANIDS</strong> unit from your army is within Synapse Range of your army:
      <ul>
        <li>Each time that unit takes a Battle-shock test, take that test on 3D6 instead of 2D6.</li>
        <li>Each time a model in that unit makes a melee attack, add 1 to the Strength characteristic of that attack.</li>
      </ul>"
  -
    name: Shadow in the Warp
    text: "Once per battle, in either player's Command phase, if one or more units from your army with this ability are on the battlefield, you can unleash the Shadow in the Warp. When you do, each enemy unit on the battlefield must take a Battle-shock test. Each time an enemy unit takes such a Battle-shock test, if it is within 6\" of one or more <strong>SYNAPSE</strong> units from your army, subtract 1 from that test."
  -
    name: Skittering Hordes
    text: "Enemy units' ranged attacks that target a friendly <strong>VARDENGHAST SWARM INFANTRY</strong> unit not within 12\" have -1 to <strong>hit rolls</strong>."
  strategems:
  -
    name: "Swarm-marked"
    cost: 1
    turn: your
    when: "End of your Movement phase."
    target: "One friendly <strong>VARDENGHAST SWARM TERMAGANTS</strong> unit."
    effect: "Select one <strong>objective</strong> your unit is controlling. That <strong>objective</strong> is <strong>secured</strong>"
  -
    name: "Skulking Hunters"
    cost: 1
    turn: opponent
    when: "Start o your opponent's Shooting phase"
    target: "One friendly <strong>VARDENGHAST SWARM INFANTRY</strong> unit."
    effect: "Your unit has -6\" <strong>detection range</strong>."
  -
    name: Brute Speed
    cost: 1
    turn: your
    when: "Your Movement phase, when a friendly <strong>VARDENGHAST SWARM</strong> unit is selected to make an <strong>advance move</strong>."
    target: "That <strong>VARDENGHAST SWARM</strong> unit."
    effect: "Your unit can change that <strong>advance roll</strong> to a 6."
  enhancements:
  -
    name: "Psychoclastic Overload"
    target: Psychophage (Vardenghast Swarm)
    text: "Upgrade: <strong>VARDENGHAST SWARM PSYCHOPHAGE</strong> unit only. This unit can re-roll rolls to determine the <strong>A</strong> of a weapon."
  -
    name: "Adapted Organism"
    target: Terror of Vardenghast
    text: "<strong>VARDENGHAST SWARM WINGED TYRANID PRIME</strong> model only.
      <ul>
        <li>This mode has 4+ <strong>InSv</strong>.</li>
        <li>This model's melee attacks have +2 <strong>AP</strong></li>
      </ul>"
- # Amonhotekh's Guard
  name: Amonhotekh's Guard
  disposition: Take and Hold
  abilities:
  -
    name: Reanimation Protocols
    text: "<p>At the end of your Command phase, each unit from your army activates its Reanimation Protocols and reanimates D3 wounds. Each time such a unit reanimates a wound:</p>
      <ul>
        <li>If that unit contains one or more models with fewer than their starting number of wounds remaining, select one of those models; that model regains one lost wound.</li>
        <li>If all models in that unit have their starting number of wounds, but that unit is not at its Starting Strength, one destroyed model is returned to that unit with one wound remaining.</li>
      </ul>
      <p>Once such a unit is at its Starting Strength and all of its models have their starting number of wounds, nothing further happens.</p>"
  -
    name: Territorial Imperatives
    text: "<ul>
      <li>At the end of your Command phase, you can select one friendly <strong>AMONHOTEKH'S GUARD</strong> unit. That unit has +1 <strong>OC</strong> until the start of your next Command phase.</li>
      <li>When playing a Combat Patrol battle, the following friendly units must start the battle in <strong>strategic reserves</strong> and cannot be set up on the battlefield before the battle round stated. When doing so, they must be set up wholly within your deployment zone.
        <ul>
          <li><strong>CANOPTEK DOOMSTALKER</strong>: Battle round 3.
        </ul>
        </li>
      </ul>"
  strategems:
  -
    name: "Guass Storm"
    cost: 1
    turn: your
    when: "Your Shooting phase, when a friendly <strong>AMONHOTEKH'S GUARD NECRON WARRIORS</strong> unit is <strong>selected to shoot</strong>."
    target: "That <strong>AMONHOTEKH'S GUARD NECRON WARRIORS</strong> unit."
    effect: "Your unit's attacks have +1 to <strong>hit rolls</strong>"
  -
    name: "Aggression Protocols"
    cost: 1
    turn: your
    when: "Your Movement phase, when a friendly <strong>AMONHOTEKH'S GUARD</strong> unit (excluding <strong>MONSTER/VEHICLE</strong> units) is selected to make a <strong>fall-back move</strong>."
    target: "That <strong>AMONHOTEKH'S GUARD</strong> unit."
    effect: "That move does not prevent your unit from being <strong>eligible to shoot/declare a charge</strong>."
  -
    name: "Reinforced Resilience"
    cost: 1
    turn: opponent
    when: "Your opponent's Shooting phase, when an enemy unit targets a friendly <strong>AMONHOTEKH'S GUARD</strong> unit (excluding <strong>MONSTER/VEHICLE</strong> units) with every model within a <strong>terrain area</strong>."
    target: "That <strong>AMONHOTEKH'S GUARD</strong> unit."
    effect: "Your unit has +1 <strong>Sv</strong>."
  enhancements:
  -
    name: "Unblemished Legions"
    target: Necron Warriors (Amonhotekh's Guard)
    text: "Upgrade: <strong>AMONHOTEKH'S GUARD NECRON WARRIORS</strong> unit only.
      <ul>
        <li>This unit has +1 <strong>M</strong></li>
        <li>This unit's ranged attacks have <strong>[ASSAULT]</strong></li>
      </ul>"
  -
    name: "Metalline Might"
    target: Overlord Amonhotekh
    text: "<strong>AMONHOTEKH'S GUARD OVERLORD</strong> model only. This model's melee attacks have +2 <strong>S</strong>."
- # Morgim's Butchas
  name: Morgim's Butchas
  abilities:
  -
    name: Waaagh!
    text: "<p>If your Army Faction is ORKS, once per battle, at the start of your Command phase, you can call a Waaagh!. If you do, until the start of your next Command phase, the Waaagh! is active for your army and:</p>
      <ul>
        <li>Units from your army with this ability are eligible to declare a charge in a turn in which they Advanced.</li>
        <li>Add 1 to the Strength and Attacks characteristics of melee weapons equipped by models from your army with this ability.</li>
        <li>Models from your army with this ability have a 5+ invulnerable save.</li>
      </ul>"
  strategems:
  -
    name: "Tough as Squig-hide"
    cost: 1
    turn: either
    when: "Your opponent's Shooting phase or the Fight phase, just after an enemy unit has selected its targets."
    target: "One ORKS INFANTRY unit from your army that was selected as the target of one or more of the attacking unit's attacks."
    effect: "Until the end of the phase, each time an attack targets your unit, if the Strength characteristic of that attack is greater than the Toughness characteristic of your unit, subtract 1 from the Wound roll."
  -
    name: "Bestial Bellow"
    cost: 1
    turn: either
    when: "Start of the Fight phase."
    target: "One BEASTBOSS or SQUIGHOG BOYZ model from your army."
    effect: "Select one enemy unit within 3\" of your model. That enemy unit must take a Battle-shock test and when doing so, subtract 1 from the result."
  -
    name: "Get In There!"
    cost: 1
    turn: either
    when: "Fight phase, just before an ORKS unit from your army Piles In."
    target: "That ORKS unit."
    effect: "Until the end of the phase, each time a model in your unit makes a Pile-in move, it can move up to 6\" instead of up to 3\"."
  enhancements:
  -
    name: "Half-Chewed"
    text: "Models in the bearer's unit have the Feel No Pain 5+ ability. In addition, each time a ranged attack is allocated to a model in the bearer's unit, add 1 to any armour saving throw made against that attack."
  -
    name: "Bosskilla"
    text: "Melee weapons equipped by the bearer have the [Precision] and [Sustained Hits 1] abilities."
  secondaries:
  -
    name: "Bag The Big 'Un"
    text: "At the start of the first battle round, select one enemy MONSTER or VEHICLE model. If there are no such enemy models, select the enemy WARLORD model instead.
    
      At the end of the battle, you score 8VP if that enemy model is destroyed. If that enemy model was destroyed by your BEASTBOSS model, you score 12VP instead."
  -
    name: "Krumpin' Spree"
    text: "At the end of your turn, you score 3VP if you control the objective marker closest to your opponent's battlefield edge and you score 1VP for each other objective you control that is not within your deployment zone."
- # Sanctuary Guardians
  name: Sanctuary Guardians
  disposition: Take and Hold
  abilities:
  -
    name: Acts of Faith
    text: "<p>Each unit from your army can perform one Act of Faith per phase. This is done using Miracle dice.</p>
      <h3>Gaining Miracle Dice</h3>
      <p>You gain 1 Miracle dice:</p>
      <ul>
        <li>At the start of each turn.</li>
        <li>Each time an ADEPTA SORORITAS unit from your army is destroyed.</li>
      </ul>
      <p>Each time you gain a Miracle dice, roll one D6. The number you roll is the value of that Miracle dice. This value cannot be changed or re-rolled, unless a rule specifically states otherwise. Keep your Miracle dice to one side - this is your Miracle dice pool.</p>
      <h3>Performing an Act of Faith</h3>
      <p>
      Before making a dice roll for a model or unit from your army with the Acts of Faith ability, if you have one or more dice in your Miracle dice pool, that unit can perform an Act of Faith.
      If it does, select one of the dice from your Miracle dice pool to substitute that dice roll (if a roll involves more than one dice, e.g. a Charge roll or Battle-shock test, only a single dice can be substituted).
      The dice that is being substituted is not rolled; instead, the value of the selected Miracle dice is used as if it had been rolled (this counts as an unmodified dice roll of that value for all rules purposes).
      Each miracle dice can only by selected for substitution once. Once all Miracle dice substitutions have been made, remove the chosen Miracle dice from your Miracle dice pool, and roll all remaining, unsubstituted dice that are part of the dice roll.
      You can use Miracle dice when a unit performs an Act of Faith for any of the following types of dice roll:
      </p>
      <ul>
        <li>Advance roll</li>
        <li>Battle-shock test</li>
        <li>Charge roll</li>
        <li>Damage roll</li>
        <li>Hit roll</li>
        <li>Saving throw</li>
        <li>Wound roll</li>
      </ul>
      "
  -
    name: Blessed Believers
    text: "<ul>
        <li>Melee attacks that target a friendly <strong>SANCTUARY GUARDIANS</strong> unit have -1 to <strong>hit rolls</strong>.</li>
        <li>When playing a Combat Patrol battle, in your Command phase, you can discard 1 Miracle dice. If you do, you gain 1 CP.</li>
      </ul>"
  strategems:
  -
    name: "Take Cover"
    cost: 1
    turn: either
    when: "Your opponent's Shooting phase or the Fight phase, when an enemy unit targets a friendly <strong>SANCTUARY GUARDIANS</strong> unit (excluding <strong>ARCO-FLAGELLANTS</strong> units) within a <strong>terrain area</strong>."
    target: "That <strong>SANCTUARY GUARDIANS</strong> unit."
    effect: "Your unit has +1 <strong>Sv</strong>."
  -
    name: "Fervent Devotion"
    cost: 1
    turn: your
    when: "Your Movement phase, when a friendly <strong>SANCTUARY GUARDIANS</strong> unit is selected to make an <strong>advance/fall-back move</strong>"
    target: "That <strong>SANCTUARY GUARDIANS</strong> unit."
    effect: "That move does not prevent your unit from being <strong>eligible to shoot/declare a charge</strong>."
  -
    name: "Fires of Damnation"
    cost: 1
    turn: either
    when: "Your Shooting phase or the Fight phase, when a friendly <strong>SANCTUARY GUARDIANS</strong> unit is <strong>selected to attack</strong>."
    target: "That <strong>SANCTUARY GUARDIANS</strong> unit."
    effect: "<ul>
        <li>Your unit's Torrent weapons have 6 <strong>A</strong>.</li>
        <li>Your unit's attacks have +1 <strong>AP</strong></li>
      </ul>"
  enhancements:
  -
    name: "Righteous Fervour"
    target: Canoness Adalya
    text: "<strong>SANCTUARY GUARDIANS CANONESS</strong> model only.
      <ul>
        <li>This model's melee attacks have +1 <strong>D</strong></li>
        <li>This unit's melee attacks have +1 to <strong>wound rolls</strong></li>
      </ul>"
  -
    name: "Divine Miracle"
    target: Battle Sisters Squad (Sanctuary Guardians)
    text: "Upgrade: <strong>SANCTUARY GUARDIANS BATTLE SISTERS SQUAD</strong> unit only. (Once per battle, per unit) At the start of any phase, you can use this ability. If you do, this unit <strong>heals</strong> D3+2 wounds."
- # Prism of Zadophon
  name: Prism of Zadophon
  disposition: Take and Hold
  abilities:
  -
    name: Cabal of Sorcerers
    text: "<p>At the start of your Shooting phase, one or more models from your army with this ability can attempt Rituals from those listed below. To do so, select one model from your army with this ability that has not yet attempted a Ritual this turn and select one Ritual no model from your army has attempted to manifest this turn, then take a Psychic test for that model by following the sequence below.</p>
      <h3>Psychic Test Sequence</h3>
      <p><strong>Roll 2D6</strong></p>
      <p><strong>Channel the Warp</strong><br>(Optional)</p>
      <p>Then, if one or more doubles or triples were rolled during this test, that model's unit suffers D3 mortal wounds.</p>
      <p>If that model is not destroyed, the combined total of all the dice rolled during this test is the Psychic test result. If this equals or exceeds the Warp Charge value of the Ritual being attempted, that model manifests that ritual and you resolve its effects.</p>
      <h4 class=\"psychicTest\">Destiny's Ruin (Psychic)</h4>
      <p><strong>Warp Charge - 5</strong></p>
      <p>Select one enemy unit within 24\" of and visible to the manifesting model. Until the end of the phase, each time a THOUSAND SONS model from your army makes an attack that targets that unit, re-roll a Hit roll of 1. If the Psychic test result for this Ritual was 10+, you can re-roll the Hit roll instead.</p>
      <h4 class=\"psychicTest\">Temporal Surge (Psychic)</h4>
      <p><strong>Warp Charge - 6</strong></p>
      <p>Select one friendly THOUSAND SONS unit that is not within Engagement Range of one or more enemy units and is within 24\" of and visible to the manifesting model. That unit can make a Normal move of up to D6\". If the Psychic test result for this Ritual was 10+, that unit can make a Normal move of up to 6\" instead. In either case, until the end of the turn, that unit is not eligible to declare a charge.</p>
      <h4 class=\"psychicTest\">Doombolt (Psychic)</h4>
      <p><strong>Warp Charge - 7</strong></p>
      <p>Select one enemy unit within 24\" of and visible to the manifesting model (excluding units with the Lone Operative ability that are not part of an Attached unit and are not within 12\" of the manifesting model); that unit suffers D3 mortal wounds. If the Psychic test result for this Ritual was 11+, that unit suffers D3+3 mortal wounds instead.</p>
      <h4 class=\"psychicTest\">Twist of Fate (Psychic)</h4>
      <p><strong>Warp Charge - 9</strong></p>
      <p>Select one enemy unit within 24\" of and visible to the manifesting model. Until the end of the phase, each time a <strong>THOUSAND SONS</strong> model from your army makes an attack that targets that unit, improve the Armour Penetration characteristic of that attack by 1. If the Psychic test result for this ritual was 12+, improve the Armour Penetration characteristic of that attack by 2 instead.</p>
      "
  -
    name: Committed to the Ritual
    text: "<ul>
        <li>Friendly <strong>PRISM OF ZADOPHON</strong> units have +1 <strong>Ld</strong> while within range of an <strong>objective</strong>.</li>
        <li>When playing a Combat Patrol battle, the following friendly units must start the battle in <strong>strategic reserves</strong> and cannot be set up on the battlefield before the battle round stated. When doing so, they must be set up wholly within your deployment zone.
          <ul>
            <li><strong>DAEMON PRINCE</strong>: Battle round 3.</li>
          </ul></li>
      </ul>"
  strategems:
  -
    name: "Twist of Fate"
    cost: 1
    turn: either
    when: "Your opponent's Shooting phase or the Fight phase, just after an enemy unit targets a friendly <strong>PRISM OF ZADOPHON MUTANT</strong> unit."
    target: "That <strong>PRISM OF ZADOPHON MUTANT</strong> unit."
    effect: "Your unit has 4+ <string>InSv</strong>."
  -
    name: "Spell-warded Armour"
    cost: 1
    turn: opponent
    when: "Your opponent's Shoting phase, when an enemy unit targets a friendly <strong>PRISM OF ZADOPHON RUBRIC MARINES</strong> unit."
    target: "That <strong>PRISM OF ZADOPHON RUBRIC MARINES</strong> unit."
    effect: "Ranged attacks that target your unit with a <strong>S</strong> greater than your unit's <strong>T</strong> have -1 to <strong>wound rolls</strong>."
  -
    name: "Embroiling Energies"
    cost: 1
    turn: your
    when: "Your Shooting phase, when a friendly <strong>PRISM OF ZADOPHON RUBRIC MARINES</strong> unit is <strong>selected to shoot</strong>."
    target: "That <strong>PRISM OF ZADOPHON RUBRIC MARINES</strong> unit."
    effect: "That unit's malefic curse weapon has:
      <ul>
        <li><strong>[CLOSE-QUARTERS]</strong></li>
        <li>+1 to <strong>hit rolls</strong></li>
      </ul>"
  enhancements:
  -
    name: "Foresight of the Changer"
    target: Tzaangor Shaman (Prism of Zadophon)
    text: "<strong>PRISM OF ZADOPHON TZAANGOR SHAMAN</strong> model only. (Once per turn, per unit) In your opponent's Movement phase, when an enemy unit ends a move within 8\" of this unit, if this unit is <strong>unengaged</strong>, this unit can make a <strong>normal move</strong> of up to D3+1\""
  -
    name: "Warp-tainted Shells"
    target: Daemon Prince (Prism of Zadophon)
    text: "<strong>PRISM OF ZADOPHON DAEMON PRINCE</strong> model only. This model's infernal cannon weapon has <strong>[PSYCHIC]</strong>."
- # The Coven Temporus
  name: The Coven Temporus
  abilities:
  -
    name: Cabal of Sorcerers
    text: "<p>At the end of your Command phase, each model from your army with this ability that is on the battlefield (excluding Battle-shocked models) generates you a number of Cabal points equal to the number shown in its ability (e.g. a model with the Cabal of Sorcerers 2 ability would generate you 2 Cabal points). The combined total of these is your Cabal points pool.</p>
      <p>During the battle round, you can use Rituals from the list below, deducting the Cabal points cost of each one from your Cabal points pool. If you do not have enough Cabal points for a Ritual, you cannot use it. Each Ritual can only be used once per phase. At the start of your next Command phase, your Cabal points pool resets to zero. Each time you use a Ritual, select one THOUSAND SONS PSYKER model from your army, then apply that Ritual's effect using the PSYKER.</p>
      <h4 class=\"psychicTest\">Weaver of Fates (Psychic)</h4>
      <p><strong>2 Cabal points</strong></p>
      <p>Use this Ritual at the start of any phase. Once during that phase, when a saving throw is failed for a friendly THOUSAND SONS model whose unit is within 18\" of this PSYKER, you can re-roll that saving throw.</p>
      <h4 class=\"psychicTest\">Echos from the Warp (Psychic)</h4>
      <p><strong>6 Cabal points</strong></p>
      <p>Use this Ritual at the start of any phase. Once that phase, you can select this PSYKER's unit as the target of a Stratagem for 0CP, even if you have already used that Stratagem this phase.</p>
      "
  strategems:
  -
    name: "Wreathed in Warpflame"
    cost: 1
    turn: either
    when: "Fight phase."
    target: "One THOUSAND SONS unit from your army (excluding TZAANGORS) that has not been selected to fight this phase."
    effect: "Until the end of the phase, melee weapons equipped by models in your unit have the [LETHAL HITS] ability and each time a model in your unit makes an attack that targets a MONSTER or VEHICLE unit, and unmodified Hit roll of 5+ scores a Critical Hit."
  -
    name: "Mutant Cunning"
    cost: 1
    turn: opponent
    when: "Your opponent's Shooting phase, just after an enemy unit has selected its targets."
    target: "One TZAANGORS unit from your army that was selected as the target of one or more of the attacking unit's attacks."
    effect: "Your unit can make a Normal move of up to D6\" and, until the end of the phase, each time a ranged attack targets your unit, models in your unit have the Benefit of Cover against that attack."
  -
    name: "Malign Entanglement"
    cost: 1
    turn: opponent
    when: "Your opponent's Charge phase, just after an enemy unit has declared a charge."
    target: "One THOUSAND SONS unit from your army that was selected as a target of that charge."
    effect: "Until the end of the phase, subtract 2 from Charge rolls made for that enemy unit."
  enhancements:
  -
    name: "Temporal Sorceries"
    text: "The bearer has the Deep Strike and Lone Operative abilities. In addition, at the end of your Command phase, if the bearer is on the battlefield, you gain D3 Cabal points."
  -
    name: "Arch-Diabolist"
    text: "The bearer has the Deep Strike and Lone Operative abilities. In addition, both of the bearer's Screamer Invocation weapon profiles have the [CLOSE-QUARTERS] ability."
  secondaries:
  -
    name: "Sorcerous Ritual"
    text: "<p>From the second battle round onwards, at the end of your opponent's Fight phase, if one or more PSYKER models from your army are within range of an objective marker that you control and that is not within your deployment zone, roll one D6, adding 1 to the result for each remaining Cabal point you have (to a maximum of +3): on a 5+, you score 3VP</p>"
  -
    name: "Bringer of Change"
    text: "<p>At the end of each phase, you score D3 VP if one or more enemy models were destroyed by Psychic Attacks made by models from your army that phase.</p>
      <p>You cannot score more than 12VP from this secondary objective</p>"
- # Purge Corps Deltic-9
  name: Purge Corps Deltic-9
  disposition: Purge the Foe
  abilities:
  -
    name: Doctrina Imperatives
    text: "<p>At the start of the battle round, you can select one of the Doctrina Imperatives below. Until the end of the battle round, that Doctrina Imperative is active for your army, and all units from your army that have the Doctrina Imperative ability gain the relevant abilities shown below.</p>
      <h3>Protector Imperative</h3>
      <ul>
        <li>Ranged weapons have <strong>[HEAVY]</strong>.</li>
        <li>Ranged weapons have +1 <strong>BS</strong></li>
        <li>Each time a melee attack targets this unit, if this unit has the <strong>BATTLELINE</strong> keyword and/or is within 6\" of one or more friendly <strong>ADEPTUS MECHANICUS BATTLELINE</strong> units, subtract 1 from the <strong>hit roll</strong>.</li>
      </ul>
      <h3>Conqueror Imperative</h3>
      <ul>
        <li>Ranged weapons have <strong>[ASSAULT]</strong>.</li>
        <li>Melee weapons have +1 <strong>WS</strong></li>
        <li>Each time a model in this unit makes an attack, if this unit has the <strong>BATTLELINE</strong> keyword and/or it is within 6\" of one or more friendly <strong>ADEPTUS MECHANICUS BATTLELINE</strong> units, improve the <strong>AP</strong> of that attack by 1.</li>
      </ul>
      "
  -
    name: Imperative Overload
