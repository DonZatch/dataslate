      value: "At the start or end of your Movement phase, you can use this ability. If you do:
        <ul>
          <li>Select on friendly <strong>unengaged VARDENGHAST SWARM TERMAGANTS</strong> unit. This unit <strong>heals</strong> 2D6 wounds.</li>
          <li><u>Or:</u> Select one friendly <strong>destroyed VARDENGHAST SWARM TERMAGANTS</strong> unit. That unit <strong>heals</strong> 10 wounds and is placed in <strong>strategic reserves</strong>.</li>
        </ul>"
  factions: 
  - Tyranids
  composition:
  -
    label: "This model is equipped with:"
    value: "prime talons"
